version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: mestrado-qdrant
    restart: unless-stopped
    environment:
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__LOG_LEVEL: INFO
      # QDRANT__SERVICE__API_KEY: "coloque_sua_chave_aqui"  # opcional
    ports:
      - "${QDRANT_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - ./qdrant_data:/qdrant/storage
      - ./qdrant_config:/qdrant/config
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333
          && printf "GET /healthz HTTP/1.0\r\nHost: localhost\r\n\r\n" >&3
          && grep -q "healthz check passed" <&3'
      interval: 30s
      timeout: 10s
      retries: 3
